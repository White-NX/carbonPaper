name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.18.0

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Verify update signing secrets
        shell: pwsh
        env:
          CARBONPAPER_UPDATE_SIGNING_KEY: ${{ secrets.CARBONPAPER_UPDATE_SIGNING_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CARBONPAPER_UPDATE_SIGNING_KEY)) {
            throw "CARBONPAPER_UPDATE_SIGNING_KEY secret is required"
          }

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Run security guards
        run: npm run test:security

      - name: Restore release asset cache
        uses: actions/cache@v4
        with:
          path: .release-assets
          key: release-assets-${{ runner.os }}-${{ hashFiles('scripts/release-assets/ocr-models.json', 'scripts/release-assets/onnxruntime-directml.json') }}

      - name: Prepare release assets
        run: npm run prepare:release-assets

      - name: Build NMH binary
        run: npm run build:nmh:release

      - name: Build Rust OCR worker
        run: npm run build:ml:release

      - name: Build Rust semantic worker
        run: npm run build:semantic-ml:release

      - name: Smoke test bundled Rust OCR runtime
        run: npm run verify:ml-runtime

      - name: Smoke test bundled Rust semantic runtime
        run: npm run verify:semantic-runtime

      - name: Verify staged release assets
        run: npm run test:release-assets

      - name: Build Tauri draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseDraft: true

      - name: Build portable zip
        run: npm run pack:portable

      - name: Verify release assets after packaging
        run: npm run test:release-assets && npm run verify:release-bundles

      - name: Fetch Release Notes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Try to fetch the release body created by the user or tauri-action
          $body = gh release view ${{ github.ref_name }} --json body -q .body
          if ($LASTEXITCODE -ne 0 -or [string]::IsNullOrWhiteSpace($body)) { 
            $body = "Release ${{ github.ref_name }}" 
          }
          $body | Out-File -FilePath release_body.txt -Encoding utf8

      - name: Generate latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARBONPAPER_UPDATE_SIGNING_KEY: ${{ secrets.CARBONPAPER_UPDATE_SIGNING_KEY }}
          CARBONPAPER_UPDATE_PUBLIC_KEY_FILE: src-tauri/update-public-key.txt
        run: node scripts/generate-latest-json.mjs ${{ github.ref_name }} release_body.txt

      - name: Smoke test previous stable portable update
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARBONPAPER_UPDATE_SIGNING_KEY: ${{ secrets.CARBONPAPER_UPDATE_SIGNING_KEY }}
          CARBONPAPER_UPDATE_SMOKE_MIN_PREVIOUS_VERSION: ${{ vars.CARBONPAPER_UPDATE_SMOKE_MIN_PREVIOUS_VERSION }}
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $zipFile = "src-tauri/target/release/bundle/nsis/carbonpaper_${version}_x64_portable.zip"
          $latestJson = "src-tauri/target/release/bundle/nsis/latest.json"
          $smokeArgs = @{
            TargetTag                              = "${{ github.ref_name }}"
            TargetVersion                          = $version
            CandidateZip                           = $zipFile
            LatestJson                             = $latestJson
            TimeoutSeconds                         = 180
            SkipIfPreviousReleaseLacksSmokeSupport = $true
          }
          if (-not [string]::IsNullOrWhiteSpace($env:CARBONPAPER_UPDATE_SMOKE_MIN_PREVIOUS_VERSION)) {
            $smokeArgs["MinPreviousVersionWithSmokeHook"] = $env:CARBONPAPER_UPDATE_SMOKE_MIN_PREVIOUS_VERSION
          }
          ./scripts/update-smoke.ps1 @smokeArgs

      - name: Build forward update smoke target
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $core = ($version -split '[-+]')[0]
          $parts = $core.Split('.')
          if ($parts.Count -ne 3) {
            throw "Cannot derive forward smoke version from tag version '$version'"
          }
          $patch = [int]$parts[2] + 1
          $futureVersion = "$($parts[0]).$($parts[1]).$patch"
          "CARBONPAPER_FORWARD_SMOKE_VERSION=$futureVersion" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

          node scripts/bump-version.mjs $futureVersion --label ""
          npm run build:ml:release
          npm run verify:ml-runtime
          npm run build:semantic-ml:release
          npm run verify:semantic-runtime
          npm run tauri -- build --no-bundle
          npm run pack:portable

      - name: Smoke test candidate forward portable update
        shell: pwsh
        env:
          CARBONPAPER_UPDATE_SIGNING_KEY: ${{ secrets.CARBONPAPER_UPDATE_SIGNING_KEY }}
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $futureVersion = $env:CARBONPAPER_FORWARD_SMOKE_VERSION
          $candidateZip = "src-tauri/target/release/bundle/nsis/carbonpaper_${version}_x64_portable.zip"
          $futureZip = "src-tauri/target/release/bundle/nsis/carbonpaper_${futureVersion}_x64_portable.zip"
          $latestJson = "src-tauri/target/release/bundle/nsis/latest.json"
          ./scripts/update-smoke.ps1 `
            -TargetTag "${{ github.ref_name }}" `
            -TargetVersion $futureVersion `
            -ManifestVersion $futureVersion `
            -ExpectedAppVersion $futureVersion `
            -SourcePortableZip $candidateZip `
            -CandidateZip $futureZip `
            -LatestJson $latestJson `
            -TimeoutSeconds 180 `
            -RequireAppliedMarker

      - name: Upload portable zip and latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          $zipFile = "src-tauri/target/release/bundle/nsis/carbonpaper_${version}_x64_portable.zip"
          $latestJson = "src-tauri/target/release/bundle/nsis/latest.json"
          gh release upload ${{ github.ref_name }} $zipFile $latestJson --clobber

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit ${{ github.ref_name }} --draft=false
